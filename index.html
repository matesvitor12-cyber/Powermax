
  <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Produto Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* Estilos Gerais */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #0f172a; /* Azul Escuro Moderno */
            color: #f8fafc;
            line-height: 1.6;
        }

        /* Container Principal */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Cabeçalho */
        header {
            padding: 40px 0;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        p.subtitle {
            color: #94a3b8;
            font-size: 1.1rem;
        }

        /* Grid de Produtos */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 50px;
        }

        /* Card do Produto */
        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 20px;
            padding: 15px;
            transition: transform 0.3s ease, border-color 0.3s ease;
            text-align: center;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: #38bdf8;
        }

        .card img {
            width: 100%;
            border-radius: 15px;
            height: 250px;
            object-fit: cover; /* Faz a foto preencher o espaço sem distorcer */
            margin-bottom: 15px;
        }

        .card h2 {
            font-size: 1.4rem;
            margin-bottom: 10px;
        }

        .price {
            font-size: 1.6rem;
            font-weight: bold;
            color: #38bdf8;
            display: block;
            margin: 10px 0;
        }

        /* Botão de Compra */
        .btn {
            display: inline-block;
            background: #38bdf8;
            color: #0f172a;
            padding: 12px 25px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            width: 100%;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.8;
        }

        /* Rodapé */
        footer {
            margin-top: 80px;
            padding: 40px;
            text-align: center;
            border-top: 1px solid #334155;
            color: #64748b;
        }

        /* Ajuste para Celular */
        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>OFERTAS EXCLUSIVAS</h1>
            <p class="subtitle">Qualidade premium selecionada para você.</p>
        </header>

        <section class="product-grid">
            
            <div class="card">
                <img src="https://images.unsplash.com/photo-1615526675159-e248c3117d97?auto=format&fit=crop&q=80&w=500" alt="Produto 1">
                <h2>Nome do Produto 01</h2>
                <span class="price">R$ 147,90</span>
                <a href="#" class="btn">Comprar Agora</a>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?auto=format&fit=crop&q=80&w=500" alt="Produto 2">
                <h2>Nome do Produto 02</h2>
                <span class="price">R$ 299,00</span>
                <a href="#" class="btn">Comprar Agora</a>
            </div>

        </section>

        <footer>
            &copy; 2026 Minha Loja Online. Todos os direitos reservados.
        </footer>
    </div>

</body>
</html>
