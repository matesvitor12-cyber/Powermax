<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Powermax | Tecnologia de Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: #050505; color: #ffffff; line-height: 1.6; }
        .header { padding: 50px 20px; text-align: center; background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%); }
        h1 { font-size: 2.8rem; font-weight: 900; letter-spacing: -2px; color: #00d4ff; }
        .tagline { color: #888; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 3px; }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }

        /* Estilo do Carrossel */
        .carousel {
            position: relative;
            width: 100%;
            height: 300px;
            overflow: hidden;
            border-radius: 16px;
            margin-bottom: 20px;
        }
        .carousel-track {
            display: flex;
            width: 100%;
            height: 100%;
            overflow-x: scroll;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
        }
        /* Esconde a barra de rolagem */
        .carousel-track::-webkit-scrollbar { display: none; }
        
        .carousel-item {
            min-width: 100%;
            height: 100%;
            scroll-snap-align: start;
        }
        .carousel-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        /* Indicador de "Deslize para o lado" */
        .scroll-hint {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.6);
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            color: #00d4ff;
        }

        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; }
        .card { background: #111; border: 1px solid #222; border-radius: 24px; padding: 20px; transition: 0.3s; }
        .card:hover { border-color: #00d4ff; }
        .card h2 { font-size: 1.4rem; margin-bottom: 8px; }
        .description { color: #94a3b8; font-size: 0.9rem; margin-bottom: 15px; min-height: 60px; }
        .price { font-size: 1.8rem; font-weight: 900; color: #00d4ff; display: block; margin-bottom: 15px; }

        .btn-whatsapp {
            display: flex; align-items: center; justify-content: center;
            background-color: #25d366; color: #fff; text-decoration: none;
            padding: 15px; border-radius: 12px; font-weight: bold; transition: 0.3s;
        }
        footer { text-align: center; padding: 50px; color: #444; font-size: 0.8rem; }
    </style>
</head>
<body>

    <header class="header">
        <h1>POWERMAX</h1>
        <p class="tagline">Performance Sem Limites</p>
    </header>

    <div class="container">
        <section class="product-grid">
            
            <div class="card">
                <div class="carousel">
                    <div class="carousel-track">
                        <div class="carousel-item"><img src="https://images.unsplash.com/photo-1615526675159-e248c3117d97?q=80&w=800"></div>
                        <div class="carousel-item"><img src="https://images.unsplash.com/photo-1609091839697-ebc48710baab?q=80&w=800"></div>
                        <div class="carousel-item"><img src="https://images.unsplash.com/photo-1593941707874-ef25b8b4a92b?q=80&w=800"></div>
                        <div class="carousel-item"><img src="https://images.unsplash.com/photo-1585338107529-13afc5f02586?q=80&w=800"></div>
                    </div>
                    <div class="scroll-hint">Deslize ⮕</div>
                </div>

                <h2>Powerbank Max Ultra</h2>
                <p class="description">Energia infinita no seu bolso. Design blindado com 4 camadas de proteção e carga rápida para até 3 dispositivos.</p>
                <span class="price">R$ 189,90</span>
                <a href="https://wa.me/559991614826?text=Olá%20Powermax!%20Quero%20comprar%20o%20Powerbank%20Max%20Ultra" class="btn-whatsapp">
                    Comprar via WhatsApp
                </a>
            </div>

            </section>

        <footer>
            &copy; 2026 Powermax Store. Todos os direitos reservados.
        </footer>
    </div>

</body>
</html>
