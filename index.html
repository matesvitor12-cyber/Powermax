<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Powermax | Tecnologia de Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { background-color: #050505; color: #ffffff; line-height: 1.6; }

        .header {
            padding: 60px 20px;
            text-align: center;
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
        }

        h1 { font-size: 3rem; font-weight: 900; letter-spacing: -2px; color: #00d4ff; margin-bottom: 5px; }
        .tagline { color: #888; font-size: 1rem; text-transform: uppercase; letter-spacing: 3px; }

        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }

        .pix-info {
            background: #111;
            border: 1px dashed #333;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 40px;
            font-size: 0.9rem;
        }
        .pix-key { color: #00d4ff; font-weight: bold; word-break: break-all; }

        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }

        .card {
            background: #111;
            border: 1px solid #222;
            border-radius: 24px;
            padding: 20px;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }
        .card:hover { border-color: #00d4ff; transform: translateY(-5px); }

        .card img {
            width: 100%;
            height: 280px;
            object-fit: cover;
            border-radius: 16px;
            margin-bottom: 20px;
        }

        .card h2 { font-size: 1.5rem; margin-bottom: 8px; }
        .price { font-size: 1.8rem; font-weight: 900; color: #00d4ff; display: block; margin-bottom: 20px; }

        .btn-whatsapp {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #25d366;
            color: #fff;
            text-decoration: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: 0.3s;
        }
        .btn-whatsapp:hover { background-color: #128c7e; }

        footer { text-align: center; padding: 60px 20px; color: #444; font-size: 0.8rem; }
    </style>
</head>
<body>

    <header class="header">
        <h1>POWERMAX</h1>
        <p class="tagline">Performance Sem Limites</p>
    </header>

    <div class="container">
        <div class="pix-info">
            Pagamentos via PIX para entrega imediata:<br>
            <span class="pix-key">1a0258aa-b0d6-42c8-b346-1f41505566e6</span>
        </div>

        <section class="product-grid">
            
            <div class="card">
                <img src="https://images.unsplash.com/photo-1615526675159-e248c3117d97?q=80&w=800" alt="Produto Powermax">
                <h2>Powerbank Max Ultra</h2>
                <span class="price">R$ 189,90</span>
                <a href="https://wa.me/559991614826?text=Olá%20Powermax!%20Quero%20comprar%20o%20Powerbank%20Max%20Ultra" class="btn-whatsapp">
                    Comprar via WhatsApp
                </a>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?q=80&w=800" alt="Produto Powermax">
                <h2>Headset Power Pro</h2>
                <span class="price">R$ 349,00</span>
                <a href="https://wa.me/559991614826?text=Olá%20Powermax!%20Quero%20comprar%20o%20Headset%20Power%20Pro" class="btn-whatsapp">
                    Comprar via WhatsApp
                </a>
            </div>

        </section>

        <footer>
            &copy; 2026 Powermax Store. Todos os direitos reservados.
        </footer>
    </div>

</body>
</html>
